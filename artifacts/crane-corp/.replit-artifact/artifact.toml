kind = "web"
previewPath = "/"
title = "Crane Manufacturing Corporate Website"
version = "1.0.0"
id = "artifacts/crane-corp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22388

[services.development]
run = "pnpm --filter @workspace/crane-corp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crane-corp", "run", "build" ]
publicDir = "artifacts/crane-corp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22388"
BASE_PATH = "/"
